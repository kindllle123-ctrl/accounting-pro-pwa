[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/service-worker.js"
  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/manifest.json"
  [headers.values]
  Content-Type = "application/manifest+json"

[[headers]]
for = "/*"
  [headers.values]
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "DENY"
  X-XSS-Protection = "1; mode=block"
